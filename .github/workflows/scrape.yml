name: Scraping BRVM quotidien

on:
  schedule:
    # 20h00 Abidjan (UTC+0) du lundi au vendredi
    # La BRVM est fermée le week-end, inutile de scraper
    - cron: '0 20 * * 1-5'
  workflow_dispatch:
    inputs:
      include_info_societes:
        description: "Inclure le scraping des infos sociétés (lent)"
        required: false
        default: "false"

concurrency:
  group: brvm-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DJANGO_SETTINGS_MODULE: lookupbrvm.settings
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-scraping.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scraping.txt

      # 1) Cours & indices (critique)
      - name: Scraper cours & indices
        run: python scraper_brvm.py full

      # 2) News (non bloquant)
      - name: Scraper news
        run: python scraper_news_brvm.py
        continue-on-error: true

      # 3) Dividendes (non bloquant)
      - name: Scraper dividendes
        run: python scraper_dividendes.py
        continue-on-error: true

      # 4) Infos sociétés — uniquement le lundi (jour 1) ou si déclenché manuellement avec le flag
      - name: Scraper infos sociétés & indices (hebdo)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_info_societes == 'true'
        run: python scraper_info_societes.py
        continue-on-error: true

      - name: Scraper infos sociétés & indices (lundi auto)
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            python scraper_info_societes.py
          else
            echo "Pas lundi — on saute infos sociétés."
          fi
        continue-on-error: true

      # 5) Import des CSV scrapés dans Supabase Postgres via Django ORM
      #    Les CSV sont éphémères ; les données vont directement dans la DB hébergée.
      - name: Import dans Supabase
        run: python manage.py import_data

      # 6) Snapshot quotidien du conseil Sikafinance (1 ligne / action / jour)
      #    Écrit directement en DB via update_or_create (idempotent).
      - name: Logger conseils Sikafinance
        run: python manage.py importer_conseils_sikafinance
        continue-on-error: true

      # 7) Backfill incrémental des signaux historiques (verdict 4-axes)
      #    Idempotent : skip les dates déjà calculées, traite la nouvelle barre du jour.
      - name: Backfill incrémental des signaux
        run: python manage.py backfill_signals
        continue-on-error: true

      # Plus de commit de db.sqlite3 : la base est maintenant sur Supabase
      # Postgres et reçoit les écritures directement via DATABASE_URL.

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            scraper.log
            scraper_news.log
            scraper_info.log
          if-no-files-found: ignore
          retention-days: 14
