name: Ré-entraînement mensuel des modèles GARCH

on:
  schedule:
    # 1er jour de chaque mois, 22h UTC (après le scrape quotidien à 20h UTC)
    - cron: '0 22 1 * *'
  workflow_dispatch:
    inputs:
      ticker:
        description: "Limiter à un seul ticker (laisser vide = tous)"
        required: false
        default: ""
      min_obs:
        description: "Nb minimum d'observations"
        required: false
        default: "500"

concurrency:
  group: brvm-train-garch
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    env:
      DJANGO_SETTINGS_MODULE: lookupbrvm.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-garch.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-garch.txt

      # Migrations no-op si déjà appliquées sur le db.sqlite3 versionné
      - name: Appliquer les migrations
        run: python manage.py migrate --noinput

      - name: Entraîner les modèles GARCH
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ -n "${{ github.event.inputs.min_obs }}" ]; then
            ARGS="$ARGS --min-obs ${{ github.event.inputs.min_obs }}"
          fi
          python manage.py train_garch $ARGS

      - name: Commit & push db.sqlite3
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db.sqlite3
          if git diff --cached --quiet; then
            echo "Aucun changement dans db.sqlite3."
          else
            git commit -m "chore(garch): ré-entraînement mensuel $(date -u +'%Y-%m')"
            git push
          fi
